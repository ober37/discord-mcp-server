# Smithery MCP registry configuration
# https://smithery.ai
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      discordToken:
        type: string
        description: "Discord bot token"
      guildId:
        type: string
        description: "Default Discord server (guild) ID"
    required:
      - discordToken
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['@ncodelife/discord-mcp-server', '--token', config.discordToken, ...(config.guildId ? ['--guild-id', config.guildId] : [])],
      env: {}
    })
